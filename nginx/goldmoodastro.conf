# /etc/nginx/sites-available/goldmoodastro.conf
# ln -s /etc/nginx/sites-available/goldmoodastro.conf /etc/nginx/sites-enabled/

# ─── HTTP → HTTPS (ana domain) ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name goldmoodastro.com www.goldmoodastro.com admin.goldmoodastro.com;

    # ACME / certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTP → HTTPS (alternatif domainler — .com.tr / .info / .online) ───────────
server {
    listen 80;
    listen [::]:80;
    server_name
        goldmoodastro.com.tr www.goldmoodastro.com.tr
        goldmoodastro.info   www.goldmoodastro.info
        goldmoodastro.online www.goldmoodastro.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://goldmoodastro.com$request_uri;
    }
}

# ─── Backend API + Frontend ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.goldmoodastro.com goldmoodastro.com;

    ssl_certificate     /etc/letsencrypt/live/goldmoodastro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goldmoodastro.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/performance.conf;

    # Statik dosyalar (local storage driver)
    location /uploads/ {
        alias /var/www/goldmoodastro/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Müşteri tasarım önizlemeleri (geçici — sunum sonrası kaldırılabilir)
    location = /1 {
        alias /var/www/goldmoodastro/previews/1.html;
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "no-store";
    }
    location = /2 {
        alias /var/www/goldmoodastro/previews/2.html;
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "no-store";
    }

    # Tüm /api/ istekleri backend'e
    location /api/ {
        proxy_pass         http://127.0.0.1:8094;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        client_max_body_size 25M;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8094/api/health;
        access_log off;
    }

    # Next.js static assets (cache-friendly)
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3095;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            365d;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # Frontend (Next.js — port 3095)
    location / {
        proxy_pass         http://127.0.0.1:3095;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── HTTPS — Alternatif domainler (.com.tr / .info / .online) → 301 ────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name
        goldmoodastro.com.tr www.goldmoodastro.com.tr
        goldmoodastro.info   www.goldmoodastro.info
        goldmoodastro.online www.goldmoodastro.online;

    ssl_certificate     /etc/letsencrypt/live/goldmoodastro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goldmoodastro.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://goldmoodastro.com$request_uri;
}

# ─── Admin Panel ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.goldmoodastro.com;

    ssl_certificate     /etc/letsencrypt/live/goldmoodastro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goldmoodastro.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/snippets/security-headers.conf;

    location / {
        proxy_pass         http://127.0.0.1:3094;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        client_max_body_size 10M;
    }
}
