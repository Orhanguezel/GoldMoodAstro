# =============================================================
# GoldMoodAstro — Nginx Performance (compression only)
# Include in server block: include /etc/nginx/snippets/performance.conf;
# Cache/expires direktifleri ana server bloğunda location'lara eklenir.
# =============================================================

# Brotli compression (Ubuntu 24.04: libnginx-mod-http-brotli-{filter,static})
# Module yoksa nginx -t fail eder. Modül kurulu ise yorumdan çıkar.
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css application/javascript application/json application/xml text/xml image/svg+xml application/wasm;

# Gzip
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/json
  application/xml
  application/xml+rss
  image/svg+xml
  font/woff2;
