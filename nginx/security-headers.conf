# =============================================================
# Konigsmassage — Nginx Security Headers
# Include in server block: include /etc/nginx/snippets/security-headers.conf;
# =============================================================

# HSTS — Force HTTPS for 2 years, include subdomains, preload-ready
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Control referrer information
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Restrict browser features
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;

# Content Security Policy (Next.js compatible — allows inline scripts for hydration)
# Note: 'unsafe-inline' is needed for Next.js inline scripts and styled-jsx
# connect-src includes apex+www (www→apex redirect race güvencesi), LiveKit wss,
# Google Analytics/Maps, OAuth ve geocode (nominatim). img-src https: genis (avatar/cloudinary/oauth foto).
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://www.google.com https://www.gstatic.com https://maps.googleapis.com https://accounts.google.com https://connect.facebook.net https://appleid.cdn-apple.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://goldmoodastro.com https://www.goldmoodastro.com https://admin.goldmoodastro.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com https://maps.googleapis.com https://nominatim.openstreetmap.org https://accounts.google.com https://graph.facebook.com wss://*.livekit.cloud https://*.livekit.cloud; media-src 'self' blob: https:; frame-src 'self' https://www.google.com https://accounts.google.com https://appleid.apple.com https://www.facebook.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';" always;
