name: GoldMoodAstro Deploy

# =============================================================================
# 2026-07-20 — rsync tabanlı dağıtım GIT PULL + SUNUCUDA BUILD akışına çevrildi.
#
# NEDEN:
#   Eski akış `rsync --delete` ile doğrudan çalışan dizinlere yazıyordu.
#     • Aktarım sırasında frontend/.next siliniyor, uygulama build'siz kalıyor,
#       PM2 sürekli yeniden başlıyordu (52 restart, nginx connection refused).
#     • /var/www/goldmoodastro bir GIT DEPOSU olduğu için rsync çalışma ağacını
#       kirletiyordu; elle yapılan `git pull` sürekli "local changes / untracked
#       files would be overwritten" ile kilitleniyordu. İki rakip dağıtım
#       mekanizması (CI rsync + elle git pull) birbiriyle çakışıyordu.
#
# YENİ AKIŞ:
#   1) build-check (CI)  — kod derleniyor mu? Kırıksa prod'a hiç dokunulmaz.
#   2) deploy (TEK iş)   — sunucuda: git pull → build → pm2 reload → sağlık
#                          kontrolü; herhangi bir adım düşerse önceki commit'e
#                          geri dönülür ve yeniden derlenir.
#
# NEDEN TEK İŞ: üç ayrı iş paralel çalışıp aynı git deposunda `git pull`
# yapsaydı birbirini kilitlerdi. Sıra: backend → admin → frontend.
#
# .env DOSYALARI: git tarafından yönetilmiyor (gitignore), dolayısıyla artık
# dağıtım sırasında korunması gereken bir şey değil — rsync'teki en kırılgan
# noktalardan biri kendiliğinden ortadan kalktı.
#
# SEED: bilinçli olarak otomatik ÇALIŞTIRILMIYOR. Şema/içerik değişiklikleri
# elle uygulanır (`bun src/db/index.ts --no-drop --only=...`), çünkü tam seed
# admin şifrelerini sıfırlıyor ve kullanıcı içeriğini ezebiliyor.
# =============================================================================

# TETIKLEYICI NOTU (2026-07-20): prod deposu su an `feat/mobile-nutuya-selective-merge`
# branch'ini takip ediyor (main degil). Sunucu kendi upstream'ini cektigi icin
# tetikleyiciye her ikisi de eklendi. Uzun vadede dogrusu tek branch'te (main)
# birlesmek; bu bir merge karari oldugu icin burada zorlanmadi.
on:
  push:
    branches:
      - main
      - feat/mobile-nutuya-selective-merge

jobs:
  # ─── 1) Derleme kapısı — prod'a dokunmaz ──────────────────────────
  build-check:
    name: Build check (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Backend build
        working-directory: backend
        run: |
          bun install --frozen-lockfile || bun install
          bun run build

      - name: Admin panel build
        working-directory: admin_panel
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          bun install --frozen-lockfile || bun install
          bun run build

      - name: Theme snapshot drift
        run: bun run check:theme

      - name: Frontend build
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          NEXT_PUBLIC_APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          NEXT_PUBLIC_APPLE_REDIRECT_URI: https://goldmoodastro.com/auth/apple/callback
        run: |
          bun install --frozen-lockfile || bun install
          bun run theme:guard
          bun run theme:drift-check
          bun run relax:drift-check
          bun run relax:asset-guard
          bun run build

  # ─── 2) Dağıtım — sunucuda git pull + build ───────────────────────
  deploy:
    name: Deploy (git pull + build on server)
    needs: build-check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Pull, build, reload, health-check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          timeout: 60s
          command_timeout: 25m
          script: |
            set -euo pipefail
            ROOT=/var/www/goldmoodastro
            cd "$ROOT"

            # --- Çalışma ağacı temiz mi? -----------------------------------
            # Git tabanlı dağıtımda sunucuda yerel değişiklik OLMAMALI.
            # Sessizce `git checkout .` yapmıyoruz: birinin elle yaptığı bir
            # düzeltmeyi habersiz silmek, kırık deploy'dan daha kötüdür.
            if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
              echo "HATA: sunucuda commit'lenmemis degisiklik var:"
              git status --short --untracked-files=no
              echo "Once bunlari commit'le ya da stash'le, sonra tekrar deploy et."
              exit 1
            fi

            PREV="$(git rev-parse HEAD)"
            echo "Onceki surum: $PREV"

            build_all() {
              cd "$ROOT/backend"     && { bun install --frozen-lockfile || bun install; } && bun run build
              cd "$ROOT/admin_panel" && { bun install --frozen-lockfile || bun install; } && bun run build
              cd "$ROOT/frontend"    && { bun install --frozen-lockfile || bun install; } && bun run build
              cd "$ROOT"
            }

            reload_all() {
              pm2 reload goldmoodastro-backend  || pm2 start "$ROOT/backend/ecosystem.config.cjs"     --only goldmoodastro-backend
              pm2 reload goldmoodastro-admin    || pm2 start "$ROOT/admin_panel/ecosystem.config.cjs" --only goldmoodastro-admin
              pm2 reload goldmoodastro-frontend || pm2 start "$ROOT/frontend/ecosystem.config.cjs"    --only goldmoodastro-frontend
              pm2 save
            }

            # Sağlık: backend /api/health, frontend /tr, admin kök
            # (admin 307 döndürür — login yönlendirmesi, sağlıklı sayılır).
            health_ok() {
              for i in 1 2 3 4 5; do
                ok=1
                curl -fsS -o /dev/null --max-time 10 http://127.0.0.1:8094/api/health || ok=0
                curl -fsS -o /dev/null --max-time 10 http://127.0.0.1:3095/tr        || ok=0
                curl -s  -o /dev/null --max-time 10 -w '%{http_code}' http://127.0.0.1:3094 \
                  | grep -qE '^(200|301|302|307|308)$' || ok=0
                [ "$ok" = "1" ] && return 0
                sleep 3
              done
              return 1
            }

            rollback() {
              echo "$1 — onceki surume donuluyor ($PREV)"
              git reset --hard "$PREV"
              build_all || echo "UYARI: geri donus build'i de basarisiz"
              reload_all || true
              exit 1
            }

            # --- Dağıtım ----------------------------------------------------
            # Sunucu KENDI takip ettigi branch'i ceker. Tetikleyici branch ile
            # sunucunun branch'i farkli olabilir; bu kasitli (yukaridaki nota bak).
            BRANCH="$(git rev-parse --abbrev-ref HEAD)"
            echo "Sunucu branch: $BRANCH"
            git pull --ff-only
            echo "Yeni surum: $(git rev-parse HEAD)"

            build_all  || rollback "BUILD BASARISIZ"
            reload_all
            health_ok  || rollback "SAGLIK KONTROLU BASARISIZ"

            echo "Dagitim tamam: $(git rev-parse --short HEAD)"
            pm2 list | grep goldmood || true
