name: GoldMoodAstro Deploy

on:
  push:
    branches: [main]

jobs:
  # ─── Backend ─────────────────────────────────────────────────────
  deploy-backend:
    name: Backend — build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install & build backend
        working-directory: backend
        run: |
          rm -rf dist .tsbuildinfo || true
          bun install --frozen-lockfile || bun install
          bun run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync backend → VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          SSH_OPTS="-o ConnectTimeout=30 -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"
          for i in 1 2 3; do
            rsync -avz --delete \
              --exclude=node_modules --exclude=.git --exclude=.env \
              --exclude=uploads --exclude=.DS_Store \
              -e "ssh $SSH_OPTS" \
              backend/ "${VPS_USER}@${VPS_HOST}:/var/www/goldmoodastro/backend" \
              && break
            echo "⚠ Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: PM2 reload — backend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          timeout: 60s
          command_timeout: 90s
          script: |
            set -e
            cd /var/www/goldmoodastro/backend
            bun install --frozen-lockfile || bun install
            pm2 reload goldmoodastro-backend \
              || pm2 start ecosystem.config.cjs --only goldmoodastro-backend
            pm2 save
            # Bind kontrolü (port 8094)
            ss -ltnp | grep ':8094' || (echo "Port 8094 açık değil!" && exit 1)

  # ─── Admin Panel ─────────────────────────────────────────────────
  deploy-admin:
    name: Admin Panel — build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install & build admin_panel
        working-directory: admin_panel
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          bun install --frozen-lockfile || bun install
          bun run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync admin_panel → VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          SSH_OPTS="-o ConnectTimeout=30 -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"
          for i in 1 2 3; do
            rsync -avz --delete \
              --exclude=node_modules --exclude=.git --exclude=.env \
              --exclude=.DS_Store \
              -e "ssh $SSH_OPTS" \
              admin_panel/ "${VPS_USER}@${VPS_HOST}:/var/www/goldmoodastro/admin_panel" \
              && break
            echo "⚠ Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: PM2 reload — admin panel
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          timeout: 60s
          command_timeout: 90s
          script: |
            set -e
            cd /var/www/goldmoodastro/admin_panel
            bun install --frozen-lockfile || bun install
            pm2 reload goldmoodastro-admin \
              || pm2 start ecosystem.config.cjs --only goldmoodastro-admin
            pm2 save
            ss -ltnp | grep ':3094' || (echo "Port 3094 açık değil!" && exit 1)

  # ─── Frontend ────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend — build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install & build frontend
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          bun install --frozen-lockfile || bun install
          bun run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync frontend → VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          SSH_OPTS="-o ConnectTimeout=30 -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"
          for i in 1 2 3; do
            rsync -avz --delete \
              --exclude=node_modules --exclude=.git --exclude=.env \
              --exclude=.DS_Store \
              -e "ssh $SSH_OPTS" \
              frontend/ "${VPS_USER}@${VPS_HOST}:/var/www/goldmoodastro/frontend" \
              && break
            echo "⚠ Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: PM2 reload — frontend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          timeout: 60s
          command_timeout: 90s
          script: |
            set -e
            cd /var/www/goldmoodastro/frontend
            bun install --frozen-lockfile || bun install
            pm2 reload goldmoodastro-frontend \
              || pm2 start ecosystem.config.cjs --only goldmoodastro-frontend
            pm2 save
            ss -ltnp | grep ':3095' || (echo "Port 3095 açık değil!" && exit 1)
